name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd services/auth
          pip install -r requirements.txt
          cd ../attendance
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd services/auth
          pytest
          cd ../attendance
          pytest